<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Stat Bubbles background</title>
  </head>
  <body>
    <script type="module">
      import OBR from "https://esm.sh/@owlbear-rodeo/sdk";
      const { BASE_URL, EXTENSION_ID, syncAllOverlays } = await import(`./shared.js?v=${Date.now()}`);

      OBR.onReady(() => {
        syncAllOverlays();
        OBR.scene.items.onChange(() => syncAllOverlays());

        OBR.contextMenu.create({
          id: `${EXTENSION_ID}/edit-stats`,
          icons: [
            {
              icon: "https://euglossabazinga.github.io/Elyrias-Tales/icon.svg",
              label: "Edit Stats",
              filter: {
                roles: ["GM", "PLAYER"],
                min: 1,
                every: [{ key: "layer", value: "CHARACTER" }]
              }
            }
          ],
          embed: {
            url: `${BASE_URL}context.html`,
            height: 430
          },
          onClick() {
            // The context menu embed handles stat editing directly.
          }
        });
      });
    </script>
  </body>
</html>
