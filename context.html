<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Edit Stats</title>
    <link rel="stylesheet" href="context.css" />
  </head>
  <body>
    <main>
      <section class="wide-card hp-card">
        <div class="label">Hit Points</div>
        <div class="hp-inputs">
          <input id="hpCurrent" aria-label="Current hit points" inputmode="text" />
          <span>/</span>
          <input id="hpMax" aria-label="Maximum hit points" inputmode="text" />
        </div>
        <div class="hint">& maximum</div>
      </section>

      <section class="wide-row">
        <section class="wide-card fp-card">
          <div class="label">Focus Points</div>
          <div class="wide-inputs">
            <input id="fpCurrent" aria-label="Current focus points" inputmode="text" />
            <span>/</span>
            <input id="fpMax" aria-label="Maximum focus points" inputmode="text" />
          </div>
          <div class="hint">& maximum</div>
        </section>

        <section class="wide-card mp-card">
          <div class="label">Magic Points</div>
          <div class="wide-inputs">
            <input id="mpCurrent" aria-label="Current magic points" inputmode="text" />
            <span>/</span>
            <input id="mpMax" aria-label="Maximum magic points" inputmode="text" />
          </div>
          <div class="hint">& maximum</div>
        </section>
      </section>

      <section class="bubble-grid">
        <label class="bubble temp">
          <span>Temporary</span>
          <input id="temp" aria-label="Temporary hit points" inputmode="text" />
          <span>Hit Points</span>
        </label>
        <label class="bubble armor">
          <span>Armor</span>
          <input id="armor" aria-label="Armor class" inputmode="text" />
          <span>Class</span>
        </label>
      </section>

      <section class="visibility">
        <button id="visibleAll" type="button">Visible to All</button>
        <button id="visibleGm" type="button">GM Only</button>
      </section>

      <button id="playerEditable" type="button">Player Editable</button>
    </main>

    <script type="module">
      import OBR from "https://esm.sh/@owlbear-rodeo/sdk";
      import { getSelectedItems, readStats, saveStats, syncOverlaysForItems } from "./shared.js";

      const fields = {
        hpCurrent: document.querySelector("#hpCurrent"),
        hpMax: document.querySelector("#hpMax"),
        temp: document.querySelector("#temp"),
        armor: document.querySelector("#armor"),
        fpCurrent: document.querySelector("#fpCurrent"),
        fpMax: document.querySelector("#fpMax"),
        mpCurrent: document.querySelector("#mpCurrent"),
        mpMax: document.querySelector("#mpMax")
      };
      const playerEditable = document.querySelector("#playerEditable");
      const visibleAll = document.querySelector("#visibleAll");
      const visibleGm = document.querySelector("#visibleGm");
      let items = [];
      let stats;
      let saving = false;

      function render() {
        fields.hpCurrent.value = stats.hp.current;
        fields.hpMax.value = stats.hp.max;
        fields.temp.value = stats.temp.current;
        fields.armor.value = stats.armor.current;
        fields.fpCurrent.value = stats.fp.current;
        fields.fpMax.value = stats.fp.max;
        fields.mpCurrent.value = stats.mp.current;
        fields.mpMax.value = stats.mp.max;
        playerEditable.disabled = items.length === 0;
        playerEditable.classList.toggle("active", stats.playerEditable);
        visibleAll.classList.toggle("active", stats.visibility !== "gm");
        visibleGm.classList.toggle("active", stats.visibility === "gm");
      }

      async function load() {
        items = await getSelectedItems();
        stats = readStats(items[0]);
        render();
      }

      async function persist() {
        if (saving || items.length === 0) return;
        saving = true;
        try {
          await saveStats(items.map((item) => item.id), stats);
          await syncOverlaysForItems(items.map((item) => item.id));
        } catch (error) {
          console.error(error);
          alert(`Overlay error: ${error?.message ?? error}`);
        } finally {
          saving = false;
        }
      }

      function applyInput(stat, field, rawValue) {
        const currentValue = stats[stat][field] ?? 0;
        const value = rawValue.trim();
        if (/^[+-]\d+$/.test(value)) return currentValue + Number(value);
        const number = Number(value);
        return Number.isFinite(number) ? number : currentValue;
      }

      function bind(input, stat, field) {
        input.addEventListener("change", async () => {
          stats[stat][field] = applyInput(stat, field, input.value);
          render();
          await persist();
        });
        input.addEventListener("keydown", (event) => {
          if (event.key === "Enter") input.blur();
        });
      }

      bind(fields.hpCurrent, "hp", "current");
      bind(fields.hpMax, "hp", "max");
      bind(fields.temp, "temp", "current");
      bind(fields.armor, "armor", "current");
      bind(fields.fpCurrent, "fp", "current");
      bind(fields.fpMax, "fp", "max");
      bind(fields.mpCurrent, "mp", "current");
      bind(fields.mpMax, "mp", "max");

      playerEditable.addEventListener("click", async () => {
        stats.playerEditable = !stats.playerEditable;
        render();
        await persist();
      });

      visibleAll.addEventListener("click", async () => {
        stats.visibility = "all";
        render();
        await persist();
      });

      visibleGm.addEventListener("click", async () => {
        stats.visibility = "gm";
        render();
        await persist();
      });

      OBR.onReady(load);
    </script>
  </body>
</html>
