<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Stat Bubbles background</title>
  </head>
  <body>
    <script type="module">
      import OBR from "https://esm.sh/@owlbear-rodeo/sdk";
      import { BASE_URL, EXTENSION_ID } from "./shared.js";

      OBR.onReady(() => {
        OBR.contextMenu.create({
          id: `${EXTENSION_ID}/edit-stats`,
          icons: [
            {
              icon: "https://euglossabazinga.github.io/Elyrias-Tales/icon.svg",
              label: "Edit Stats",
              filter: {
                roles: ["GM", "PLAYER"],
                min: 1
              }
            }
          ],
          embed: {
            url: `${BASE_URL}context.html`,
            height: 390
          },
          onClick() {
            // The context menu embed handles stat editing directly.
          }
        });
      });
    </script>
  </body>
</html>
